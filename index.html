<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Football Manager</title>
<link rel="stylesheet" href="football-style.css">
</head>
<body>

<header class="topbar">
<h1>إدارة القروب</h1>
</header>

<section class="card">
<h2>لعبة جديدة</h2>

<label class="dateCard">
تاريخ اللعب
<input type="date" id="matchDate">
</label>

<div id="matchPlayers" class="checks">
<label><span>محمد</span><input type="checkbox"></label>
<label><span>أحمد</span><input type="checkbox"></label>
<label><span>عبدالله</span><input type="checkbox"></label>
<label><span>خالد</span><input type="checkbox"></label>
<label><span>ناصر</span><input type="checkbox"></label>
</div>
</section>

<section class="card">
<h2>الإيداعات</h2>

<label class="dateCard">
تاريخ الإيداع
<input type="date" id="depositDate">
</label>

<div class="depositButtons">
<button class="depositBtn blue">إيداع</button>
<button class="depositBtn red">خصم/مديونية</button>
<button class="depositBtn orange">تأخير</button>
</div>
</section>

<section class="card">
<h2>الفريقين</h2>

<div class="calendarBox">
<h3>المشاركون</h3>

<div class="item"><b>محمد</b></div>
<div class="item"><b>أحمد</b></div>
<div class="item"><b>عبدالله</b></div>

</div>
</section>

<section class="card">
<h2>كشف اللاعب</h2>

<div class="playerOps">

<div class="depositRow">
<span class="typeText">تأخير</span>
<span class="amountText">-2 KD</span>
</div>

<div class="depositRow">
<span class="typeText">خصم</span>
<span class="amountText">-5 KD</span>
</div>

<div class="depositRow">
<span class="typeText">إيداع</span>
<span class="amountText">+10 KD</span>
</div>

<div class="depositRow">
<span class="typeText">إيداع مبدئي</span>
<span class="amountText">+20 KD</span>
</div>

</div>
</section>

<script src="football-app.js"></script>
</body>
</html>
