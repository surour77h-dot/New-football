<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f5132">
<title>🏆 سجل وحسابات ⚽️ قروب الكورة 🏆</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1 id="appTitle">🏆 سجل وحسابات ⚽️ قروب الكورة 🏆</h1></header>
<nav>
<button onclick="showTab('newMatch')">لعبة</button>
<button onclick="showTab('teams')">الفريقين</button>
<button onclick="showTab('deposits')">الإيداعات</button>
<button onclick="showTab('calendar')">التقويم</button>
<button onclick="showTab('playerTable')">الجدول</button>
<button onclick="showTab('playerFilter')">كشف لاعب</button>
<button onclick="showTab('matchLog')">السجل</button>
<button onclick="showTab('players')">اللاعبين</button>
<button onclick="showTab('backup')">الإعدادات</button>
</nav>

<main>
<section id="newMatch" class="tab active">
<h2 id="matchFormTitle">لعبة جديدة</h2>
<div class="card">
<input type="hidden" id="editingMatchId">
</div>
</section>

<section id="teams" class="tab"><h2>الفريقين</h2></section>
<section id="deposits" class="tab"><h2>الإيداعات</h2></section>
<section id="calendar" class="tab"><h2>التقويم</h2></section>

<section id="playerTable" class="tab">
<h2>جدول اللاعبين</h2>
<div id="playerTableWrap"></div>
</section>

<section id="reports" class="tab">
<h2>التقارير</h2>
<div id="reportSummary"></div>
<div id="reportsList"></div>
</section>

<section id="playerFilter" class="tab">
<h2>كشف لاعب</h2>
<div class="card">
<label>اختر اللاعب</label>
<select id="playerFilterSelect" onchange="renderPlayerFilter()"></select>
</div>
<div id="playerFilterContent"></div>
</section>

<section id="backup" class="tab">
<h2>الإعدادات</h2>

<div class="card">
<h3>عنوان البرنامج</h3>
<input id="appTitleInput" type="text" placeholder="اكتب الاسم الجديد للبرنامج">
<button class="primary wide" onclick="saveAppTitle()">حفظ العنوان</button>
</div>

<div class="card">
<h3>التقارير والنسخ الاحتياطي</h3>
<button class="primary wide" onclick="exportToExcel()" style="background: #198754; border-color: #157347; color: white; margin-bottom: 10px; font-weight: bold;">📊 تصدير البيانات إلى Excel</button>
<button class="wide" onclick="exportData()">تصدير نسخة احتياطية (JSON)</button>
<label class="wide importBtn">استيراد البيانات<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
</div>

<div class="card">
<h3>ترتيب الصفحات</h3>
<p class="muted">اختر الصفحة ثم حرّكها للأعلى أو للأسفل، وسيتم حفظ الترتيب تلقائيًا.</p>
<div id="pageOrderList"></div>
</div>
</section>

<section id="editPage" class="tab editOnly">
<h2 id="editPageTitle">تعديل</h2>
<div class="card"></div>
</section>
</main>

<script src="app.js"></script>
</body>
</html>
